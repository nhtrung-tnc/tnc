name: Optimize uploaded media

on:
  push:
    branches:
      - main
    paths:
      - "assets/uploads/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Pillow
        run: pip install pillow

      - name: Optimize uploads
        run: python scripts/optimize_uploads.py

      - name: Commit optimized media
        run: |
          if git diff --quiet -- assets/uploads; then
            echo "No optimized media changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/uploads
          git commit -m "Optimize uploaded media"
          git push
